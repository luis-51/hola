<main>
<section class="profile">
<h2>Mi Perfil</h2>
<p>Administra tu información personal.</p>
<div class="profile-container">
<div class="profile-avatar">
<i id="current-avatar" class="fas fa-user-circle fa-5x"></i>
<button id="change-avatar" class="btn-secondary">Cambiar Avatar</button>
</div>
<form id="profile-form" onsubmit="guardarPerfil(event)">
<div class="form-group">
<label for="profile-nombre"><i class="fas fa-user"></i> Nombre</label>
<input type="text" id="profile-nombre" placeholder="Tu nombre completo" required>
</div>
<div class="form-group">
<label for="profile-email"><i class="fas fa-envelope"></i> Email</label>
<input type="email" id="profile-email" placeholder="tu@email.com" required>
</div>
<div class="form-group">
<label for="profile-telefono"><i class="fas fa-phone"></i> Teléfono</label>
<input type="tel" id="profile-telefono" placeholder="+1 234 567 890">
</div>
<div class="form-group">
<label for="profile-direccion"><i class="fas fa-map-marker-alt"></i> Dirección</label>
<input type="text" id="profile-direccion" placeholder="Tu dirección">
</div>
<div class="form-group">
<label for="profile-bio"><i class="fas fa-comment"></i> Biografía</label>
<textarea id="profile-bio" placeholder="Cuéntanos un poco sobre ti" rows="4"></textarea>
</div>
<button type="submit" class="btn-primary">Guardar Cambios</button>
</form>
</div>
<div id="profile-message" class="message"></div>
</section>

<!-- Modal para cambiar avatar -->
<div id="avatar-modal" class="modal">
<div class="modal-content">
<span id="avatar-close" class="close">&times;</span>
<h3>Selecciona tu Avatar</h3>
<div class="avatar-options">
<div class="avatar-option" data-avatar="fas fa-user-circle">
<i class="fas fa-user-circle fa-3x"></i>
</div>
<div class="avatar-option" data-avatar="fas fa-user">
<i class="fas fa-user fa-3x"></i>
</div>
<div class="avatar-option" data-avatar="fas fa-user-astronaut">
<i class="fas fa-user-astronaut fa-3x"></i>
</div>

</div>

<i class="fas fa-user-secret fa-3x"></i>
</div>
<div class="avatar-option" data-avatar="fas fa-user-tie">
<i class="fas fa-user-tie fa-3x"></i>
</div>
<div class="avatar-option" data-avatar="fas fa-user-md">
<i class="fas fa-user-md fa-3x"></i>
</div>
<div class="avatar-option" data-avatar="fas fa-user-graduate">
<i class="fas fa-user-graduate fa-3x"></i>
</div>
</div>
